<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriTech Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { background: #000; color: white; margin: 0; font-family: 'Barlow', sans-serif; overflow: hidden; }
        .font-heading { font-family: 'Instrument Serif', serif; font-style: italic; }
        .liquid-glass-strong {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #000;">
            <p style="font-family: sans-serif; color: #444;">Initializing Agri-Systems...</p>
        </div>
    </div>

    <script type="text/babel">
        // Safety: Wait for Framer Motion to exist globally
        const Motion = window.FramerMotion || {};

        // --- CONFIGURE YOUR DATA HERE ---
        const CHANNEL_ID = "3334736"; 
        const API_KEY = "J7OV2QHJV92DCRS9";

        const Dashboard = () => {
            const [data, setData] = React.useState({ temp: "--", hum: "--", soil: 0 });

            React.useEffect(() => {
                const getData = async () => {
                    try {
                        const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?api_key=${API_KEY}&results=1`);
                        const json = await res.json();
                        if (json.feeds && json.feeds.length > 0) {
                            const last = json.feeds[0];
                            setData({ 
                                temp: last.field1 || "--", 
                                hum: last.field2 || "--", 
                                soil: parseFloat(last.field3) || 0 
                            });
                        }
                    } catch (e) { console.log("Waiting for data..."); }
                };
                getData();
                setInterval(getData, 15000);
            }, []);

            return (
                <div className="relative h-screen w-full overflow-hidden bg-black">
                    {/* Cinematic Background */}
                    <video 
                        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
                        autoPlay muted loop playsInline
                        className="absolute inset-0 w-full h-full object-cover opacity-60"
                    />

                    {/* Dashboard UI */}
                    <div className="relative z-10 flex flex-col items-center justify-center h-full px-6">
                        <div className="text-center mb-12">
                            <h1 className="font-heading text-7xl md:text-8xl tracking-tighter leading-none mb-4">
                                Agri-Vitality
                            </h1>
                            <p className="text-white/40 uppercase tracking-widest text-xs">IoT Command Center</p>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-5xl">
                            <div className="liquid-glass-strong p-8">
                                <p className="text-[10px] uppercase tracking-[0.2em] text-white/50 mb-2">Soil Moisture</p>
                                <h2 className="font-heading text-6xl mb-2">{data.soil}%</h2>
                                <div className={`h-1 w-full rounded-full bg-white/10 overflow-hidden`}>
                                    <div className="h-full bg-white transition-all duration-1000" style={{ width: `${data.soil}%` }}></div>
                                </div>
                            </div>

                            <div className="liquid-glass-strong p-8">
                                <p className="text-[10px] uppercase tracking-[0.2em] text-white/50 mb-2">Air Temp</p>
                                <h2 className="font-heading text-6xl">{data.temp}°C</h2>
                            </div>

                            <div className="liquid-glass-strong p-8">
                                <p className="text-[10px] uppercase tracking-[0.2em] text-white/50 mb-2">Humidity</p>
                                <h2 className="font-heading text-6xl">{data.hum}%</h2>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
