<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriTech | Smart Monitoring</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Instrument Serif"', 'serif'],
            body: ['"Barlow"', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    body { background: #000; }
    .liquid-glass {
      background: rgba(255,255,255,0.01);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 9999px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    }
    .liquid-glass::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1.5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.4) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(40px);
      border-radius: 24px;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
    }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.12.16/dist/framer-motion.js"></script>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.FramerMotion;

    // --- CONFIGURATION ---
    const THINGSPEAK_CHANNEL_ID = "3334736"; // REPLACE WITH YOUR ID
    const THINGSPEAK_API_KEY = "J7OV2QHJV92DCRS9"; // REPLACE WITH YOUR KEY
    const FETCH_INTERVAL = 15000;

    const FadingVideo = ({ src }) => {
      const videoRef = useRef(null);
      useEffect(() => {
        if (videoRef.current) {
          videoRef.current.style.opacity = 0;
          const fade = () => { videoRef.current.style.opacity = 1; };
          videoRef.current.addEventListener('loadeddata', fade);
          return () => videoRef.current?.removeEventListener('loadeddata', fade);
        }
      }, [src]);

      return (
        <video 
          ref={videoRef}
          src={src} 
          autoPlay muted loop playsInline
          className="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ease-in-out z-0"
          style={{ width: '120%', left: '-10%' }}
        />
      );
    };

    const App = () => {
      const [data, setData] = useState({ temp: "--", hum: "--", soil: 0, status: "Initializing..." });

      const fetchData = async () => {
        try {
          const res = await fetch(`https://api.thingspeak.com/channels/${THINGSPEAK_CHANNEL_ID}/feeds.json?api_key=${THINGSPEAK_API_KEY}&results=1`);
          const json = await res.json();
          const latest = json.feeds[0];
          
          const soilVal = parseFloat(latest.field3);
          let status = "Optimal Condition";
          if (soilVal < 30) status = "Warning: Soil Dry";
          if (soilVal > 70) status = "Warning: Saturation High";

          setData({
            temp: latest.field1,
            hum: latest.field2,
            soil: soilVal,
            status: status
          });
        } catch (e) {
          console.error("Connection error:", e);
        }
      };

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, FETCH_INTERVAL);
        return () => clearInterval(interval);
      }, []);

      return (
        <div className="relative min-h-screen">
          {/* Hero Section */}
          <section className="relative h-screen flex flex-col items-center justify-center text-center px-6">
            <FadingVideo src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4" />
            
            <motion.div 
              initial={{ opacity: 0, y: 20 }}
              animate={{ opacity: 1, y: 0 }}
              className="z-10"
            >
              <div className="liquid-glass px-4 py-1.5 mb-8 inline-flex items-center gap-3">
                <div className="w-2 h-2 rounded-full bg-green-400 animate-pulse" />
                <span className="text-xs font-body tracking-widest uppercase opacity-80">Live Telemetry</span>
              </div>
              
              <h1 className="font-heading italic text-7xl md:text-9xl tracking-tighter leading-none mb-4">
                Terrestrial <br/> Intelligence
              </h1>
              <p className="font-body text-white/60 max-w-md mx-auto text-sm md:text-base leading-relaxed">
                Real-time environmental monitoring via ESP32. <br/> Analyzing soil vitality and atmospheric equilibrium.
              </p>

              <div className="flex flex-wrap justify-center gap-6 mt-12">
                <div className="liquid-glass-strong p-8 w-44 text-left">
                  <p className="text-[10px] uppercase tracking-widest opacity-50 mb-1">Temperature</p>
                  <p className="font-heading italic text-4xl">{data.temp}°</p>
                </div>
                <div className="liquid-glass-strong p-8 w-44 text-left">
                  <p className="text-[10px] uppercase tracking-widest opacity-50 mb-1">Humidity</p>
                  <p className="font-heading italic text-4xl">{data.hum}%</p>
                </div>
              </div>
            </motion.div>
          </section>

          {/* Data Section */}
          <section className="relative bg-black py-32 px-8 lg:px-24 z-10">
            <div className="max-w-7xl mx-auto">
              <h2 className="font-heading italic text-5xl mb-16 text-white/90 tracking-tight">System Analysis</h2>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div className="liquid-glass-strong p-10 min-h-[400px] flex flex-col border border-white/5">
                  <div className="flex justify-between items-start mb-auto">
                    <div className="p-3 bg-white/5 rounded-xl border border-white/10">
                      <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M12 3v18m9-9H3"/></svg>
                    </div>
                    <span className={`px-3 py-1 rounded-full text-[10px] font-bold tracking-tighter ${data.soil < 30 ? 'bg-red-500' : 'bg-white text-black'}`}>
                      {data.soil < 30 ? 'CRITICAL' : 'OPTIMAL'}
                    </span>
                  </div>
                  <div>
                    <h3 className="font-heading italic text-3xl mb-2">Soil Moisture</h3>
                    <p className="text-6xl font-heading mb-4">{data.soil}%</p>
                    <p className="text-sm font-body text-white/40 leading-snug">Current moisture levels detected by capacitive sensors. Status: {data.status}</p>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
